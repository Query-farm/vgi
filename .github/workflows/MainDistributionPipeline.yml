#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

# jobs:
#   duckdb-stable-build:
#     name: Build extension binaries
#     uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.3
#     with:
#       duckdb_version: v1.5.3
#       ci_tools_version: v1.5.3
#       extension_name: vgi

jobs:
  header-hygiene:
    name: Header hygiene (fan-out guardrail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce heavy-include denylist on hub headers
        # Fails if a guarded hub header (see GUARDED_HEADERS in the script /
        # CLAUDE.md "Header hygiene") transitively pulls in the Arrow umbrella.
        # Pure source scan — no build needed.
        run: python3 scripts/header_reach.py --check

  duckdb-stable-build:
    name: Build extension binaries
    uses: Query-farm-haybarn/haybarn-extension-ci-tools/.github/workflows/_extension_distribution.yml@haybarn
    secrets:
      vcpkg_token: ${{ secrets.HAYBARN_VCPKG_TOKEN }}
    with:
      duckdb_version: haybarn-v1.5.3-rc10
      ci_tools_version: haybarn
      override_ci_tools_repository: 'Query-farm-haybarn/haybarn-extension-ci-tools'
      extension_name: vgi
      use_prebuilt_images: true
      use_prebuilt_wasm_image: true
      prebuilt_image_tag: v1.5.3
      extra_toolchains: parser_tools
      # Run the integration suite (which is otherwise skipped in CI: every
      # test/sql/integration/*.test carries require-env VGI_TEST_WORKER) against
      # the published vgi-fixtures container images. The oci:// transport runs
      # each worker in a container over stdio — full subprocess fidelity, no
      # uv/Python install on the runner.
      #
      # post_build_command runs on the Linux build host BEFORE the test steps.
      # Writing to $GITHUB_ENV reaches the host "Test extension (outside docker)"
      # leg (which has Docker, so docker run works) but NOT the "inside docker"
      # leg (it runs `make test` with an explicit --env-file, so VGI_TEST_WORKER
      # stays unset there and the integration tests skip) — so the suite runs
      # exactly once, on the host, where the unittest binary already lives in its
      # build tree. macOS/Windows have no post_build_command + no Docker, so the
      # integration tests skip there too.
      post_build_command: |
        IMG=oci://ghcr.io/query-farm/vgi-fixtures:0.8.11
        {
          echo "VGI_TEST_WORKER=${IMG}-worker"
          echo "VGI_VERSIONED_WORKER=${IMG}-versioned"
          echo "VGI_VERSIONED_TABLES_WORKER=${IMG}-versioned-tables"
          echo "VGI_ATTACH_OPTIONS_WORKER=${IMG}-attach-options"
          echo "VGI_BAD_PROTOCOL_WORKER=${IMG}-bad-protocol"
          echo "VGI_BAD_ENUM_WORKER=${IMG}-bad-enum"
          echo "VGI_SIMPLE_WRITABLE_WORKER=${IMG}-simple-writable"
        } >> "$GITHUB_ENV"
